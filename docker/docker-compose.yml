version: "3.9"

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: lumos
      POSTGRES_USER: lumos
      POSTGRES_PASSWORD: lumos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumos"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4001:4001"
    environment:
      LUMOS_DATABASE_URL: >-
        postgresql://lumos:lumos@postgres:5432/lumos
      LUMOS_ADMIN_TOKEN: ${LUMOS_ADMIN_TOKEN:-changeme}
      LUMOS_ISSUER_KEY_PATH: /app/.lumos/issuer_ed25519.key
    volumes:
      - issuer_keys:/app/.lumos
      - ../policies:/app/policies
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    ports:
      - "4000:4000"
    environment:
      LUMOS_DATABASE_URL: >-
        postgresql://lumos:lumos@postgres:5432/lumos
      LUMOS_ADMIN_TOKEN: ${LUMOS_ADMIN_TOKEN:-changeme}
      LUMOS_ISSUER_KEY_PATH: /app/.lumos/issuer_ed25519.key
    volumes:
      - issuer_keys:/app/.lumos
      - ../policies:/app/policies
      - ../lumos.config.yaml:/app/lumos.config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  issuer_keys:
