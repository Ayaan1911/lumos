services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: lumos
      POSTGRES_PASSWORD: lumos
      POSTGRES_DB: lumos_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumos -d lumos_test"]
      interval: 2s
      timeout: 5s
      retries: 20

